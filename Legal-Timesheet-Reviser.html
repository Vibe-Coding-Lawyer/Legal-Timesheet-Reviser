<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Timesheet Entry Reviser</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const AlertCircle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const Check = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        );

        const Copy = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
        );

        const TimesheetReviser = () => {
            const [input, setInput] = useState('');
            const [results, setResults] = useState([]);
            const [copied, setCopied] = useState(false);

            const applyRules = (text) => {
                let revised = text;
                const changes = [];

                // Rule: TCG -> TechConsult Group
                if (revised.match(/\bTCG\b/g)) {
                    revised = revised.replace(/\bTCG\b/g, 'TechConsult Group');
                    changes.push('Expanded "TCG" to "TechConsult Group"');
                }

                // Rule: EOC -> EPA Oversight Committee
                if (revised.match(/\bEOC\b/g)) {
                    revised = revised.replace(/\bEOC\b/g, 'EPA Oversight Committee');
                    changes.push('Expanded "EOC" to "EPA Oversight Committee"');
                }

                // Rule: Capitalize Committee when referring to EPA
                if (revised.match(/\bcommittee\b/g)) {
                    revised = revised.replace(/\bcommittee\b/g, 'Committee');
                    changes.push('Capitalized "Committee"');
                }

                // Rule: Add period after initials (e.g., "J Chen" -> "J. Chen")
                const initialPattern = /\b([A-Z])\s+([A-Z][a-z]+)/g;
                if (revised.match(initialPattern)) {
                    revised = revised.replace(initialPattern, '$1. $2');
                    changes.push('Added period after initial(s)');
                }

                // Rule: "worked on" -> "Revised" or "Drafted"
                if (revised.match(/worked on (revising|drafting)/gi)) {
                    revised = revised.replace(/worked on (revising|drafting)/gi, (match, p1) => {
                        return p1.charAt(0).toUpperCase() + p1.slice(1);
                    });
                    changes.push('Changed "worked on revising/drafting" to "Revised/Drafted"');
                } else if (revised.match(/worked on/gi)) {
                    revised = revised.replace(/worked on/gi, 'Revised');
                    changes.push('Changed "worked on" to "Revised"');
                }

                // Rule: "attended" -> "Participated in"
                if (revised.match(/attended/gi)) {
                    revised = revised.replace(/attended/gi, 'Participated in');
                    changes.push('Changed "attended" to "Participated in"');
                }

                // Rule: Remove "regulatory-side" or "testimony-side"
                if (revised.match(/(regulatory-side|testimony-side)\s*/gi)) {
                    revised = revised.replace(/(regulatory-side|testimony-side)\s*/gi, '');
                    changes.push('Removed "regulatory-side" or "testimony-side"');
                }

                // Rule: "regarding" -> "re" (without colon)
                if (revised.match(/regarding/gi)) {
                    revised = revised.replace(/regarding/gi, 're');
                    changes.push('Changed "regarding" to "re"');
                }

                // Rule: Remove colon after "re"
                if (revised.match(/\bre:\s*/gi)) {
                    revised = revised.replace(/\bre:\s*/gi, 're ');
                    changes.push('Removed colon after "re"');
                }

                // Check for potential consolidation opportunities
                const hasMultipleMeetings = (revised.match(/met with/gi) || []).length > 1;
                const hasMultipleRevisions = (revised.match(/revised same/gi) || []).length > 1;
                const hasSemicolons = (revised.match(/;/g) || []).length > 2;

                const needsConsolidation = hasMultipleMeetings || hasMultipleRevisions || hasSemicolons;

                if (needsConsolidation) {
                    changes.push('⚠️ Entry may benefit from consolidation');
                }

                return { revised, changes, needsConsolidation };
            };

            const processEntries = () => {
                const lines = input.split('\n').filter(line => line.trim());
                const processed = lines.map(line => {
                    const dateMatch = line.match(/^(\d{1,2}\/\d{1,2}\/\d{4})\s*[-–—]\s*(.+)$/);
                    
                    if (dateMatch) {
                        const date = dateMatch[1];
                        const entry = dateMatch[2];
                        const { revised, changes, needsConsolidation } = applyRules(entry);
                        return {
                            date,
                            original: entry,
                            revised,
                            changes,
                            hasChanges: changes.length > 0,
                            needsConsolidation
                        };
                    } else {
                        const { revised, changes, needsConsolidation } = applyRules(line);
                        return {
                            date: null,
                            original: line,
                            revised,
                            changes,
                            hasChanges: changes.length > 0,
                            needsConsolidation
                        };
                    }
                });

                setResults(processed);
            };

            const copyAllRevised = () => {
                const revisedText = results
                    .map(r => r.date ? `${r.date} - ${r.revised}` : r.revised)
                    .join('\n');
                navigator.clipboard.writeText(revisedText);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const copyOne = (index) => {
                const r = results[index];
                const text = r.date ? `${r.date} - ${r.revised}` : r.revised;
                navigator.clipboard.writeText(text);
            };

            return (
                <div className="max-w-4xl mx-auto p-6 space-y-6">
                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                        <h2 className="text-xl font-semibold mb-2">Legal Timesheet Entry Reviser</h2>
                        <p className="text-sm text-gray-700">
                            Paste your time entries below (one per line) with dates in MM/DD/YYYY format.
                            Example: <code className="bg-white px-2 py-1 rounded">2/10/2026 - Met with Morrison team re Committee testimony; revised same</code>
                        </p>
                    </div>

                    <div className="space-y-2">
                        <label className="block font-medium">Your Time Entries:</label>
                        <textarea
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            placeholder="2/10/2026 - Revised GreenTech testimony for EPA Oversight Committee&#10;2/11/2026 - Met with TechConsult Group re document requests and productions"
                            className="w-full h-40 p-3 border rounded-lg font-mono text-sm"
                        />
                        <button
                            onClick={processEntries}
                            disabled={!input.trim()}
                            className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed"
                        >
                            Check & Revise Entries
                        </button>
                    </div>

                    {results.length > 0 && (
                        <div className="space-y-4">
                            <div className="flex justify-between items-center">
                                <h3 className="text-lg font-semibold">Results ({results.length} entries)</h3>
                                <button
                                    onClick={copyAllRevised}
                                    className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700"
                                >
                                    {copied ? <Check size={16} /> : <Copy size={16} />}
                                    {copied ? 'Copied!' : 'Copy All Revised'}
                                </button>
                            </div>

                            {results.map((result, index) => (
                                <div
                                    key={index}
                                    className={`border rounded-lg p-4 ${
                                        result.hasChanges ? 'bg-yellow-50 border-yellow-300' : 'bg-green-50 border-green-300'
                                    }`}
                                >
                                    {result.date && (
                                        <div className="font-semibold text-blue-700 mb-2">{result.date}</div>
                                    )}
                                    
                                    <div className="space-y-3">
                                        <div>
                                            <div className="text-xs font-semibold text-gray-600 mb-1">ORIGINAL:</div>
                                            <div className="bg-white p-2 rounded border text-sm font-mono">
                                                {result.original}
                                            </div>
                                        </div>

                                        <div>
                                            <div className="text-xs font-semibold text-gray-600 mb-1">REVISED:</div>
                                            {result.needsConsolidation ? (
                                                <div className="bg-orange-50 border border-orange-300 rounded p-3 space-y-3">
                                                    <div className="flex items-start gap-2 text-orange-800">
                                                        <AlertCircle size={16} className="mt-0.5 flex-shrink-0" />
                                                        <div className="text-sm">
                                                            <strong>Consolidation needed:</strong> This entry contains multiple similar actions that should be combined into a single, efficient statement.
                                                        </div>
                                                    </div>
                                                    <div className="text-xs space-y-2 bg-white p-3 rounded border">
                                                        <div className="font-semibold text-gray-700">Example:</div>
                                                        <div>
                                                            <div className="text-red-700 font-mono text-xs">❌ Met with Morrison team re emissions section of Committee testimony; revised same; met with Morrison team re water compliance section of Committee testimony; revised same</div>
                                                        </div>
                                                        <div>
                                                            <div className="text-green-700 font-mono text-xs">✅ Met with Morrison team re Committee testimony and revised same</div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="bg-white p-2 rounded border text-sm font-mono">
                                                    {result.revised}
                                                </div>
                                            )}
                                        </div>

                                        {result.changes.length > 0 && (
                                            <div>
                                                <div className="text-xs font-semibold text-gray-600 mb-1">CHANGES:</div>
                                                <ul className="text-sm space-y-1">
                                                    {result.changes.filter(change => !change.startsWith('⚠️')).map((change, i) => (
                                                        <li key={i} className="flex items-start gap-2">
                                                            <Check size={14} className="mt-0.5 text-green-600 flex-shrink-0" />
                                                            <span>{change}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}

                                        <button
                                            onClick={() => copyOne(index)}
                                            className="text-sm px-3 py-1 bg-gray-600 text-white rounded hover:bg-gray-700 flex items-center gap-2"
                                        >
                                            <Copy size={14} />
                                            Copy This Entry
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<TimesheetReviser />, document.getElementById('root'));
    </script>
</body>
</html>
